# ================================================================
# 镜像源配置文件
# ================================================================
# 用于替换 GitHub 等地址的镜像源

# --- 通用开关 ---
# 设为 true 启用镜像源，false 则使用官方源
use_custom_mirror=false

# --- GitHub 镜像 ---
# 所有 git clone / curl 的 GitHub URL 将被替换为此前缀
# 留空则不替换
# 常用镜像:
#   https://gh.con.sh/           (Cloudflare Workers)
#   https://ghproxy.com/         (ghproxy)
#   https://mirror.ghproxy.com/   (ghproxy mirror)
#   https://gh.api.99988866.xyz/  (其他)
CUSTOM_GITHUB_MIRROR=""
